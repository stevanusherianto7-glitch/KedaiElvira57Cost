<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSResto POS</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/logo-192.png">
    <script>
      // Dynamic injection to satisfy linter compatibility warnings while maintaining PWA branding
      const meta = document.createElement('meta');
      meta.name = "theme-color";
      meta.content = "#064e3b";
      document.head.appendChild(meta);
    </script>
    <meta name="msapplication-navbutton-color" content="#064e3b">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">

    <!-- Registrasi Service Worker -->
    <script>
      // Force Service Worker Update Logic
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW Registered: v1.0.2');
            
            // Check for updates every page load
            reg.update();

            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed') {
                  if (navigator.serviceWorker.controller) {
                    // New update available
                    console.log('New content available; please refresh.');
                    // Optional: window.location.reload(); 
                  }
                }
              };
            };
          }).catch(err => console.log('SW Reg failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
